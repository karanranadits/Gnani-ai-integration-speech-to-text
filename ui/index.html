<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnani Speech-to-Text</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <div class="layout">
        <!-- Main Workspace -->
        <main class="main-workspace">
            <div class="workspace-header">
                <h1>Speech to Text</h1>
                <p>Speak in any language and see the live transcription</p>
            </div>

            <div class="mic-container">
                <button id="recordBtn" class="mic-btn" aria-label="Start Recording">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </button>
                <div id="timer" class="timer">00:00</div>
                <div id="statusText" class="status-text">START SPEAKING</div>
            </div>

            <div id="transcriptContainer" class="transcript-container">
                <div id="resultBox" class="transcript-box"></div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <div class="card">
                <h3>Model Configuration</h3>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Engine</label>
                    <select disabled style="opacity: 0.8;">
                        <option>Gnani Prisma V2.5</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="languageSelect">Input Language</label>
                    <select id="languageSelect">
                        <option value="bn-IN">Bengali</option>
                        <option value="en-IN" selected>English</option>
                        <option value="gu-IN">Gujarati</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="kn-IN">Kannada</option>
                        <option value="ml-IN">Malayalam</option>
                        <option value="mr-IN">Marathi</option>
                        <option value="pa-IN">Punjabi</option>
                        <option value="ta-IN">Tamil</option>
                        <option value="te-IN">Telugu</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <h3>Actions</h3>
                <button id="downloadAudioBtn" class="action-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download Audio
                </button>
                <button id="downloadTextBtn" class="action-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Download Transcript
                </button>
            </div>
        </aside>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
